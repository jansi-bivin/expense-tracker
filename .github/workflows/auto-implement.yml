name: Auto-implement Feature Ideas

on:
  workflow_dispatch:
    inputs:
      idea_id:
        description: 'Feature idea UUID from Supabase'
        required: false
      process_all_pending:
        description: 'Process all pending ideas'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  SUPABASE_URL: https://aeypofbcgzwdrejmrwpa.supabase.co
  SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch and process ideas
        run: |
          export IDEA_ID="${{ github.event.inputs.idea_id }}"
          export PROCESS_ALL="${{ github.event.inputs.process_all_pending }}"
          node .github/scripts/process-ideas.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
